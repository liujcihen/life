<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudy Tasks - 云端待办</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-hint: #f7f9fb;      /* 背景 */
            --blue-bg: #eff5fa;        /* 卡片背景 */
            --blue-light: #dae9f4;     /* 次级元素 */
            --blue-main: #a8c7e0;      /* 主色调 */
            --blue-deep: #7b9eb5;      /* 文字/图标 */
            --blue-dark: #5a7d94;      /* 深色文字 */
            --text-main: #4a657a;
            --text-sub: #8caabb;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --shadow: 0 10px 30px rgba(168, 199, 224, 0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(145deg, var(--blue-hint), var(--blue-bg));
            min-height: 100vh;
            padding: 20px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .app-container {
            width: 100%;
            max-width: 680px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            backdrop-filter: blur(20px);
            overflow: hidden;
            animation: fadeIn 0.8s ease;
        }

        /* Header */
        .header {
            padding: 30px 30px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(218, 233, 244, 0.6);
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--blue-dark);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .date-navigator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--blue-bg);
            border-radius: var(--radius-md);
            padding: 10px 15px;
        }

        .nav-btn {
            background: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--blue-deep);
            box-shadow: 0 4px 12px rgba(168, 199, 224, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover { transform: scale(1.1); background: var(--blue-light); }

        .date-display {
            text-align: center;
        }

        .date-display .day {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--blue-dark);
        }

        .date-display .week {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-top: 4px;
        }

        /* Input Area */
        .input-area {
            padding: 20px 30px;
            display: flex;
            gap: 12px;
            border-bottom: 1px solid rgba(218, 233, 244, 0.6);
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .task-input {
            width: 100%;
            padding: 16px 20px;
            padding-right: 120px; /* 给时间选择器留空间 */
            border: 2px solid transparent;
            border-radius: var(--radius-md);
            background: white;
            font-size: 0.95rem;
            color: var(--text-main);
            transition: all 0.3s;
        }

        .task-input:focus {
            outline: none;
            border-color: var(--blue-main);
            box-shadow: 0 0 0 4px rgba(168, 199, 224, 0.2);
        }

        .time-picker {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: var(--blue-bg);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            color: var(--blue-deep);
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .add-btn {
            background: linear-gradient(135deg, #bcd9ee, var(--blue-main));
            border: none;
            width: 56px;
            height: 56px;
            border-radius: var(--radius-md);
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(168, 199, 224, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-btn:hover { transform: scale(1.05) rotate(90deg); }

        /* Task List */
        .task-list {
            padding: 10px 20px 30px;
            max-height: 450px;
            overflow-y: auto;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 18px;
            margin-top: 12px;
            border-radius: var(--radius-md);
            box-shadow: 0 6px 20px rgba(168, 199, 224, 0.15);
            animation: slideUp 0.4s ease;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .task-item.completed {
            background: var(--blue-hint);
            opacity: 0.8;
        }

        .task-item.completed::after {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: var(--blue-light);
            animation: strikeThrough 0.5s ease forwards;
        }

        .checkbox {
            width: 26px;
            height: 26px;
            border: 2px solid var(--blue-light);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .task-item.completed .checkbox {
            background: var(--blue-main);
            border-color: var(--blue-main);
        }

        .checkbox::after {
            content: '✓';
            color: white;
            font-size: 0.9rem;
            opacity: 0;
            transform: scale(0);
            transition: all 0.2s;
        }

        .task-item.completed .checkbox::after {
            opacity: 1;
            transform: scale(1);
        }

        .task-content {
            flex: 1;
            min-width: 0;
        }

        .task-text {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-main);
            transition: color 0.3s;
            word-break: break-word;
        }

        .task-item.completed .task-text {
            color: var(--text-sub);
        }

        .task-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 6px;
            font-size: 0.8rem;
            color: var(--text-sub);
        }

        .task-time {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .task-item:hover .task-actions { opacity: 1; }

        .action-btn {
            background: var(--blue-bg);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--blue-deep);
            font-size: 1rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover { background: var(--blue-light); transform: scale(1.1); }
        .action-btn.delete:hover { background: #f5dada; color: #b08080; }

        /* Particles */
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--blue-main);
            border-radius: 50%;
            pointer-events: none;
            animation: particleFly 0.8s ease-out forwards;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-sub);
        }

        .empty-state-icon { font-size: 4rem; margin-bottom: 15px; opacity: 0.7; }
        .empty-state-text { font-size: 1rem; }

        /* Token Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(180, 205, 225, 0.5);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-overlay.active { display: flex; opacity: 1; }

        .modal {
            background: rgba(255, 255, 255, 0.9);
            border-radius: var(--radius-lg);
            padding: 35px;
            width: 90%;
            max-width: 420px;
            box-shadow: var(--shadow);
            transform: translateY(20px);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal { transform: translateY(0); }

        .modal-header { margin-bottom: 20px; }
        .modal-title { font-size: 1.4rem; font-weight: 600; color: var(--blue-dark); }
        .modal-info {
            background: var(--blue-bg);
            padding: 15px;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            color: var(--blue-deep);
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .modal-info a { color: var(--blue-dark); font-weight: 500; }

        .token-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid transparent;
            border-radius: var(--radius-md);
            background: white;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .token-input:focus {
            outline: none;
            border-color: var(--blue-main);
            box-shadow: 0 0 0 4px rgba(168, 199, 224, 0.2);
        }

        .modal-actions { display: flex; justify-content: flex-end; margin-top: 20px; }
        .confirm-btn {
            background: linear-gradient(135deg, #bcd9ee, var(--blue-main));
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: var(--radius-md);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .confirm-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(168, 199, 224, 0.4); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, var(--blue-main), var(--blue-deep));
            color: white;
            padding: 14px 30px;
            border-radius: 30px;
            font-size: 0.9rem;
            box-shadow: 0 10px 30px rgba(123, 158, 181, 0.3);
            z-index: 2000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* Animations */
        @keyframes fadeIn { from: { opacity: 0; } to: { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes strikeThrough { from { width: 0; } to { width: 100%; } }
        @keyframes particleFly {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--blue-light); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1><span>☁️</span> Cloudy Tasks</h1>
            <div class="date-navigator">
                <button class="nav-btn" onclick="changeDate(-1)">‹</button>
                <div class="date-display">
                    <div class="day" id="currentDate">--</div>
                    <div class="week" id="currentWeek">----</div>
                </div>
                <button class="nav-btn" onclick="changeDate(1)">›</button>
            </div>
        </header>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" class="task-input" id="taskInput" placeholder="添加一个新的任务..." onkeydown="handleInputKeydown(event)">
                <input type="time" class="time-picker" id="timePicker">
            </div>
            <button class="add-btn" onclick="addTask()">+</button>
        </div>

        <div class="task-list" id="taskList">
            <!-- Tasks will be rendered here -->
        </div>
    </div>

    <!-- Token Modal -->
    <div class="modal-overlay" id="tokenModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">🔐 身份验证</h2>
            </div>
            <div class="modal-info">
                需要 GitHub Token 来保存你的待办事项。<br>
                前往 <a href="https://github.com/settings/tokens" target="_blank">Token 设置</a>，勾选 <strong>gist</strong> 权限生成。
            </div>
            <input type="password" class="token-input" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxx" autocomplete="off">
            <div class="modal-actions">
                <button class="confirm-btn" onclick="saveToken()">确认</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Config
        const GIST_ID = 'c9b52465d580c277cb7e55ac9e589ed4'; // Using your provided Gist ID
        const STORAGE_KEY_TOKEN = 'cloudy_tasks_token';
        
        // State
        let tasksByDate = {}; // Structure: { 'YYYY-MM-DD': [{id, text, time, completed}] }
        let currentDate = new Date();
        let editingTaskId = null;

        // DOM
        const taskListEl = document.getElementById('taskList');
        const taskInputEl = document.getElementById('taskInput');
        const timePickerEl = document.getElementById('timePicker');
        const dateEl = document.getElementById('currentDate');
        const weekEl = document.getElementById('currentWeek');
        const tokenModal = document.getElementById('tokenModal');

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            updateDateDisplay();
            const token = localStorage.getItem(STORAGE_KEY_TOKEN);
            if (!token) {
                tokenModal.classList.add('active');
            } else {
                loadData();
            }
        });

        // Token
        function saveToken() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) { showToast('请输入Token', 'error'); return; }
            localStorage.setItem(STORAGE_KEY_TOKEN, token);
            tokenModal.classList.remove('active');
            loadData();
        }

        // API
        async function apiRequest(method, data = null) {
            const token = localStorage.getItem(STORAGE_KEY_TOKEN);
            const headers = { 'Authorization': `token ${token}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' };
            const options = { method, headers };
            if (data) options.body = JSON.stringify(data);
            
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, options);
            if (res.status === 401 || res.status === 403) {
                localStorage.removeItem(STORAGE_KEY_TOKEN);
                tokenModal.classList.add('active');
                throw new Error('Token Invalid');
            }
            return res;
        }

        // Data Persistence
        async function loadData() {
            try {
                const res = await apiRequest('GET');
                const gist = await res.json();
                // We use a specific filename for todos to avoid conflict with your scroll.json
                const content = gist.files['cloudy_tasks.json']?.content || '{}';
                tasksByDate = JSON.parse(content);
            } catch (e) {
                console.error("Load error:", e);
                tasksByDate = {};
            }
            renderTasks();
        }

        async function saveData() {
            try {
                const data = {
                    description: 'Cloudy Tasks Data',
                    files: { 'cloudy_tasks.json': { content: JSON.stringify(tasksByDate, null, 2) } },
                    public: false
                };
                await apiRequest('PATCH', data);
                showToast('已保存 ☁️', 'success');
            } catch (e) {
                console.error("Save error:", e);
                showToast('保存失败，请检查Token', 'error');
            }
        }

        // Date Handling
        function updateDateDisplay() {
            const year = currentDate.getFullYear();
            const month = String(currentDate.getMonth() + 1).padStart(2, '0');
            const day = String(currentDate.getDate()).padStart(2, '0');
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            
            dateEl.textContent = `${month}月${day}日`;
            weekEl.textContent = `${year}年 · ${weekDays[currentDate.getDay()]}`;
        }

        function changeDate(offset) {
            currentDate.setDate(currentDate.getDate() + offset);
            updateDateDisplay();
            renderTasks();
            taskInputEl.focus();
        }

        function getDateKey(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // Task Logic
        function getTodaysTasks() {
            const key = getDateKey(currentDate);
            return tasksByDate[key] || [];
        }

        function setTodaysTasks(newTasks) {
            const key = getDateKey(currentDate);
            tasksByDate[key] = newTasks;
        }

        function addTask() {
            const text = taskInputEl.value.trim();
            if (!text) { taskInputEl.focus(); return; }

            const newTask = {
                id: Date.now(),
                text: text,
                time: timePickerEl.value || null,
                completed: false
            };

            const tasks = getTodaysTasks();
            tasks.push(newTask);
            setTodaysTasks(tasks);
            
            taskInputEl.value = '';
            timePickerEl.value = '';
            renderTasks();
            saveData();
        }

        function toggleTask(id) {
            const tasks = getTodaysTasks();
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                if (task.completed) createParticles(event.target);
                setTodaysTasks(tasks);
                renderTasks();
                saveData();
            }
        }

        function deleteTask(id) {
            let tasks = getTodaysTasks();
            tasks = tasks.filter(t => t.id !== id);
            setTodaysTasks(tasks);
            renderTasks();
            saveData();
            showToast('已删除');
        }

        function startEdit(id) {
            editingTaskId = id;
            renderTasks();
            // Focus the input after render
            setTimeout(() => {
                const editInput = document.querySelector('.edit-input');
                if (editInput) editInput.focus();
            }, 0);
        }

        function saveEdit(id, newText) {
            const tasks = getTodaysTasks();
            const task = tasks.find(t => t.id === id);
            if (task && newText.trim()) {
                task.text = newText.trim();
            }
            editingTaskId = null;
            setTodaysTasks(tasks);
            renderTasks();
            saveData();
        }

        // Render
        function renderTasks() {
            const tasks = getTodaysTasks();
            
            if (tasks.length === 0) {
                taskListEl.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🌱</div>
                        <div class="empty-state-text">今天没有任务<br>添加一个吧~</div>
                    </div>
                `;
                return;
            }

            taskListEl.innerHTML = tasks.map(task => {
                const isEditing = task.id === editingTaskId;
                const timeStr = task.time ? `<span class="task-time">🕒 ${task.time}</span>` : '';
                
                return `
                <div class="task-item ${task.completed ? 'completed' : ''}" data-id="${task.id}">
                    <div class="checkbox" onclick="toggleTask(${task.id})"></div>
                    <div class="task-content">
                        ${isEditing ? 
                            `<input type="text" class="task-input edit-input" value="${escapeHtml(task.text)}" onblur="saveEdit(${task.id}, this.value)" onkeydown="if(event.key==='Enter')this.blur(); if(event.key==='Escape')window.location.reload()">` :
                            `<div class="task-text" onclick="startEdit(${task.id})">${escapeHtml(task.text)}</div>`
                        }
                        <div class="task-meta">
                            ${timeStr}
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="action-btn edit" onclick="startEdit(${task.id})">✏️</button>
                        <button class="action-btn delete" onclick="deleteTask(${task.id})">🗑️</button>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Effects
        function createParticles(originEl) {
            const rect = originEl.getBoundingClientRect();
            const containerRect = taskListEl.getBoundingClientRect();
            
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = `${rect.left - containerRect.left + rect.width / 2}px`;
                particle.style.top = `${rect.top - containerRect.top + rect.height / 2}px`;
                particle.style.setProperty('--tx', `${(Math.random() - 0.5) * 100}px`);
                particle.style.setProperty('--ty', `${(Math.random() - 0.5) * 100}px`);
                taskListEl.appendChild(particle);
                setTimeout(() => particle.remove(), 800);
            }
        }

        // Utils
        function handleInputKeydown(e) {
            if (e.key === 'Enter') addTask();
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal on outside click
        tokenModal.addEventListener('click', e => {
            if (e.target === tokenModal) tokenModal.classList.remove('active');
        });
    </script>
</body>
</html>
