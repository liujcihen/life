<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>传送卷轴 - 网页记录</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-softest: #f6f9fc; /* 最浅底 */
            --blue-soft: #eef4fa;    /* 卡片底 */
            --blue-light: #dceaf5;   /* 悬停/次级 */
            --blue-main: #a8c7e0;    /* 主色调/按钮 */
            --blue-deep: #7b9eb5;    /* 文字/强调 */
            --blue-dark: #5a7d94;    /* 深色文字 */
            --text-primary: #4a657a;
            --text-secondary: #7b9eb5;
            --shadow-color: rgba(168, 199, 224, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(145deg, var(--blue-softest), var(--blue-soft));
            min-height: 100vh;
            padding: 24px;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 24px;
            box-shadow: 0 10px 30px var(--shadow-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--blue-dark);
            display: flex;
            align-items: center;
            gap: 14px;
            letter-spacing: -0.5px;
        }

        .header h1::before {
            content: "📜";
            font-size: 1.8rem;
        }

        .export-btn {
            background: linear-gradient(135deg, #bcd9ee 0%, var(--blue-main) 100%);
            color: white;
            border: none;
            padding: 13px 26px;
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(168, 199, 224, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .export-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 25px rgba(168, 199, 224, 0.5);
        }

        /* Control Panel */
        .control-panel {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .add-btn {
            background: white;
            color: var(--blue-deep);
            border: none;
            padding: 14px 24px;
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 6px 20px var(--shadow-color);
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px var(--shadow-color);
        }

        .tag-filter-container {
            flex: 1;
            min-width: 250px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 16px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            box-shadow: 0 6px 20px var(--shadow-color);
        }

        .tag-filter-label {
            font-size: 0.9rem;
            color: var(--blue-deep);
            font-weight: 500;
            white-space: nowrap;
        }

        .tag-filter-list {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            flex: 1;
        }

        .filter-tag {
            background: var(--blue-soft);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-tag:hover {
            background: var(--blue-light);
            color: var(--blue-dark);
        }

        .filter-tag.active {
            background: linear-gradient(135deg, var(--blue-main), #97b8d4);
            color: white;
            box-shadow: 0 4px 12px rgba(168, 199, 224, 0.4);
        }

        .filter-tag.all.active {
            background: linear-gradient(135deg, #adcfe8, var(--blue-main));
        }

        /* Table */
        .table-container {
            background: rgba(255, 255, 255, 0.75);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 40px var(--shadow-color);
            backdrop-filter: blur(20px);
        }

        table { width: 100%; border-collapse: collapse; }

        thead { background: rgba(238, 244, 250, 0.8); }

        th {
            padding: 18px 20px;
            text-align: left;
            font-weight: 600;
            color: var(--blue-dark);
            font-size: 0.88rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(220, 234, 245, 0.6);
            font-size: 0.92rem;
            color: var(--text-primary);
        }

        tbody tr {
            transition: background 0.3s ease;
        }

        tbody tr:hover {
            background: rgba(238, 244, 250, 0.6);
        }

        .col-id { width: 70px; color: var(--blue-main); font-weight: 500; }
        .col-name { font-weight: 500; color: var(--blue-dark); }
        .col-purpose { color: var(--text-secondary); max-width: 280px; }
        .col-url { max-width: 200px; }

        .url-link {
            color: var(--blue-deep);
            text-decoration: none;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            word-break: break-all;
        }

        .url-link:hover {
            color: var(--blue-main);
            text-decoration: underline;
        }

        .tag-item {
            display: inline-block;
            background: rgba(220, 234, 245, 0.8);
            color: var(--blue-deep);
            padding: 5px 14px;
            border-radius: 14px;
            font-size: 0.8rem;
            margin: 3px 5px 3px 0;
            transition: all 0.2s;
        }
        
        .tag-item:hover {
            background: var(--blue-light);
        }

        .action-btns { display: flex; gap: 10px; }

        .edit-btn, .delete-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 12px;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .edit-btn {
            background: rgba(186, 216, 244, 0.5);
            color: var(--blue-dark);
        }

        .edit-btn:hover {
            background: rgba(168, 199, 224, 0.8);
            color: white;
            transform: scale(1.05);
        }

        .delete-btn {
            background: rgba(244, 206, 206, 0.5);
            color: #9b7a7a;
        }

        .delete-btn:hover {
            background: rgba(228, 178, 178, 0.9);
            color: white;
            transform: scale(1.05);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(180, 205, 225, 0.4);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 28px;
            padding: 35px;
            width: 90%;
            max-width: 520px;
            box-shadow: 0 25px 60px rgba(140, 175, 205, 0.3);
            transform: translateY(30px) scale(0.98);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal {
            transform: translateY(0) scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--blue-dark);
        }

        .close-btn {
            background: var(--blue-soft);
            border: none;
            font-size: 1.4rem;
            color: var(--blue-deep);
            cursor: pointer;
            transition: all 0.2s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close-btn:hover {
            background: var(--blue-light);
            color: var(--blue-dark);
            transform: rotate(90deg);
        }

        .form-group { margin-bottom: 22px; }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: var(--blue-deep);
            font-size: 0.92rem;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid transparent;
            border-radius: 14px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: var(--blue-softest);
            color: var(--text-primary);
        }

        .form-group input::placeholder, .form-group textarea::placeholder {
            color: #a8c0d4;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--blue-main);
            background: white;
            box-shadow: 0 0 0 4px rgba(168, 199, 224, 0.2);
        }

        .form-group textarea { resize: vertical; min-height: 90px; }

        .tags-input-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 12px;
            border: 2px solid transparent;
            border-radius: 14px;
            background: var(--blue-softest);
            min-height: 54px;
            align-items: center;
            transition: all 0.3s;
        }

        .tags-input-container:focus-within {
            border-color: var(--blue-main);
            box-shadow: 0 0 0 4px rgba(168, 199, 224, 0.2);
            background: white;
        }

        .tag-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #dbe8f3, #c9dceb);
            color: var(--blue-dark);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            box-shadow: 0 2px 5px rgba(140, 170, 200, 0.2);
        }

        .tag-chip .remove-tag {
            cursor: pointer;
            color: var(--blue-deep);
            font-weight: bold;
            transition: color 0.2s;
            font-size: 1rem;
            line-height: 1;
        }

        .tag-chip .remove-tag:hover {
            color: #d48c8c;
        }

        .tag-input {
            border: none;
            background: transparent;
            flex: 1;
            min-width: 120px;
            outline: none;
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 30px;
        }

        .save-btn, .cancel-btn {
            padding: 14px 32px;
            border: none;
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .save-btn {
            background: linear-gradient(135deg, #bcd9ee 0%, var(--blue-main) 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(168, 199, 224, 0.4);
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(168, 199, 224, 0.5);
        }

        .cancel-btn {
            background: var(--blue-soft);
            color: var(--blue-deep);
        }

        .cancel-btn:hover {
            background: var(--blue-light);
        }

        /* Token Modal */
        .token-modal .modal { max-width: 440px; }

        .token-info {
            background: var(--blue-soft);
            padding: 18px;
            border-radius: 14px;
            margin-bottom: 25px;
            font-size: 0.88rem;
            color: var(--blue-deep);
            line-height: 1.7;
        }

        .token-info a {
            color: var(--blue-dark);
            text-decoration: none;
            font-weight: 500;
        }

        .token-info a:hover { text-decoration: underline; }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #a8c0d4;
        }

        .empty-state-icon { font-size: 4.5rem; margin-bottom: 20px; opacity: 0.8; }
        .empty-state-text { font-size: 1.05rem; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, var(--blue-main), var(--blue-deep));
            color: white;
            padding: 16px 35px;
            border-radius: 30px;
            font-size: 0.95rem;
            box-shadow: 0 15px 40px rgba(123, 158, 181, 0.4);
            z-index: 2000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { background: linear-gradient(135deg, #a1c4d4, #89b2c7); }
        .toast.error { background: linear-gradient(135deg, #d4b0b0, #c29e9e); }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        tbody tr { animation: fadeInUp 0.5s ease forwards; }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 15px; }
            .header { flex-direction: column; gap: 20px; text-align: center; padding: 20px; }
            .control-panel { flex-direction: column; }
            .tag-filter-container { flex-direction: column; align-items: flex-start; }
            table { display: block; overflow-x: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>传送卷轴</h1>
            <button class="export-btn" onclick="exportData()">
                <span>📤</span>
                <span>一键导出</span>
            </button>
        </header>

        <div class="control-panel">
            <button class="add-btn" onclick="openAddModal()">
                <span>✨</span>
                <span>新增记录</span>
            </button>
            <div class="tag-filter-container">
                <span class="tag-filter-label">🏷️ 标签筛选</span>
                <div class="tag-filter-list" id="tagFilterList"></div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="col-id">编号</th>
                        <th class="col-name">名称</th>
                        <th class="col-purpose">用途</th>
                        <th class="col-tags">标签</th>
                        <th class="col-url">网址</th>
                        <th class="col-actions">操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-state-icon">📝</div>
                <div class="empty-state-text">还没有记录哦<br>点击上方「新增记录」开始编织你的卷轴吧~</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">新增记录</h2>
                <button class="close-btn" onclick="closeModal('editModal')">&times;</button>
            </div>
            <form id="recordForm">
                <div class="form-group">
                    <label>名称</label>
                    <input type="text" id="recordName" placeholder="例如：AI绘画工具" required>
                </div>
                <div class="form-group">
                    <label>用途</label>
                    <textarea id="recordPurpose" placeholder="例如：用于生成概念草图"></textarea>
                </div>
                <div class="form-group">
                    <label>标签</label>
                    <div class="tags-input-container" id="tagsContainer">
                        <input type="text" class="tag-input" id="tagInput" placeholder="输入后回车添加" onkeydown="handleTagInput(event)">
                    </div>
                </div>
                <div class="form-group">
                    <label>网址</label>
                    <input type="url" id="recordUrl" placeholder="https://...">
                </div>
                <div class="modal-actions">
                    <button type="button" class="cancel-btn" onclick="closeModal('editModal')">取消</button>
                    <button type="submit" class="save-btn">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay token-modal" id="tokenModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">🔐 身份验证</h2>
                <button class="close-btn" onclick="closeModal('tokenModal')">&times;</button>
            </div>
            <div class="token-info">
                需要 GitHub Token 来读写你的 Gist 数据。<br>
                前往 <a href="https://github.com/settings/tokens" target="_blank">Token 设置页</a>，勾选 <strong>gist</strong> 权限生成即可。
            </div>
            <div class="form-group">
                <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxx" autocomplete="off">
            </div>
            <div class="modal-actions">
                <button type="button" class="save-btn" onclick="saveToken()">确认</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const GIST_ID = 'c9b52465d580c277cb7e55ac9e589ed4';
        const STORAGE_KEY_TOKEN = 'scroll_token_v2';
        const STORAGE_KEY_DATA = 'scroll_data_v2';

        let records = [];
        let allTags = new Set();
        let activeTagFilter = 'all';
        let editingId = null;

        const tableBody = document.getElementById('tableBody');
        const emptyState = document.getElementById('emptyState');
        const tagFilterList = document.getElementById('tagFilterList');
        const toast = document.getElementById('toast');

        document.addEventListener('DOMContentLoaded', init);

        async function init() {
            const token = localStorage.getItem(STORAGE_KEY_TOKEN);
            if (!token) {
                document.getElementById('tokenModal').classList.add('active');
            } else {
                await loadData();
            }
        }

        function saveToken() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) { showToast('请输入Token', 'error'); return; }
            localStorage.setItem(STORAGE_KEY_TOKEN, token);
            closeModal('tokenModal');
            loadData();
        }

        async function apiRequest(method, data = null) {
            const token = localStorage.getItem(STORAGE_KEY_TOKEN);
            const headers = {
                'Authorization': `token ${token}`,
                'Content-Type': 'application/json',
                'Accept': 'application/vnd.github.v3+json'
            };
            const options = { method, headers };
            if (data) options.body = JSON.stringify(data);
            
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, options);
            if (response.status === 401 || response.status === 403) {
                localStorage.removeItem(STORAGE_KEY_TOKEN);
                document.getElementById('tokenModal').classList.add('active');
                throw new Error('Token无效');
            }
            return response;
        }

        async function loadData() {
            try {
                const response = await apiRequest('GET');
                const gist = await response.json();
                const content = gist.files['scroll.json']?.content || '[]';
                records = JSON.parse(content);
                processTags();
                renderTable();
                renderTagFilters();
                showToast('数据加载成功', 'success');
            } catch (error) {
                const localData = localStorage.getItem(STORAGE_KEY_DATA);
                if (localData) {
                    records = JSON.parse(localData);
                    processTags();
                    renderTable();
                    renderTagFilters();
                    showToast('云端同步失败，已加载本地缓存', 'error');
                }
            }
        }

        async function saveData() {
            try {
                const data = {
                    description: '传送卷轴数据',
                    files: { 'scroll.json': { content: JSON.stringify(records, null, 2) } },
                    public: false
                };
                await apiRequest('PATCH', data);
                localStorage.setItem(STORAGE_KEY_DATA, JSON.stringify(records));
                showToast('保存成功 ☁️', 'success');
            } catch (error) {
                localStorage.setItem(STORAGE_KEY_DATA, JSON.stringify(records));
                showToast('已保存到本地', 'error');
            }
        }

        function processTags() {
            allTags.clear();
            records.forEach(r => (r.tags || []).forEach(tag => allTags.add(tag)));
        }

        function renderTable() {
            const filtered = activeTagFilter === 'all' 
                ? records 
                : records.filter(r => r.tags?.includes(activeTagFilter));

            if (filtered.length === 0) {
                tableBody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            emptyState.style.display = 'none';
            
            tableBody.innerHTML = filtered.map(record => `
                <tr>
                    <td class="col-id">${record.id}</td>
                    <td class="col-name">${escapeHtml(record.name)}</td>
                    <td class="col-purpose">${escapeHtml(record.purpose || '-')}</td>
                    <td class="col-tags">
                        ${(record.tags || []).map(tag => `<span class="tag-item">${escapeHtml(tag)}</span>`).join('')}
                    </td>
                    <td class="col-url">
                        ${record.url ? `<a href="${escapeHtml(record.url)}" target="_blank" class="url-link"><span>🔗</span>${shortenUrl(record.url)}</a>` : '-'}
                    </td>
                    <td class="col-actions">
                        <div class="action-btns">
                            <button class="edit-btn" onclick="openEditModal(${record.id})">编辑</button>
                            <button class="delete-btn" onclick="deleteRecord(${record.id})">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function renderTagFilters() {
            const tags = Array.from(allTags).sort();
            tagFilterList.innerHTML = `
                <span class="filter-tag all ${activeTagFilter === 'all' ? 'active' : ''}" onclick="setTagFilter('all')">全部</span>
                ${tags.map(tag => `
                    <span class="filter-tag ${activeTagFilter === tag ? 'active' : ''}" onclick="setTagFilter('${escapeHtml(tag)}')">${escapeHtml(tag)}</span>
                `).join('')}
            `;
        }

        function setTagFilter(tag) {
            activeTagFilter = tag;
            renderTagFilters();
            renderTable();
        }

        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = '新增记录';
            document.getElementById('recordForm').reset();
            document.getElementById('tagsContainer').innerHTML = `<input type="text" class="tag-input" id="tagInput" placeholder="输入后回车添加" onkeydown="handleTagInput(event)">`;
            document.getElementById('editModal').classList.add('active');
            setTimeout(() => document.getElementById('recordName').focus(), 100);
        }

        function openEditModal(id) {
            const record = records.find(r => r.id === id);
            if (!record) return;
            editingId = id;
            document.getElementById('modalTitle').textContent = '编辑记录';
            document.getElementById('recordName').value = record.name;
            document.getElementById('recordPurpose').value = record.purpose;
            document.getElementById('recordUrl').value = record.url;
            
            const tagsContainer = document.getElementById('tagsContainer');
            tagsContainer.innerHTML = (record.tags || []).map(tag => `
                <span class="tag-chip">${escapeHtml(tag)}<span class="remove-tag" onclick="removeTagChip(this)">×</span></span>
            `).join('') + '<input type="text" class="tag-input" id="tagInput" placeholder="输入后回车添加" onkeydown="handleTagInput(event)">';
            
            document.getElementById('editModal').classList.add('active');
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function handleTagInput(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const tag = e.target.value.trim();
                if (tag) { addTagChip(tag); e.target.value = ''; }
            }
        }

        function addTagChip(tag) {
            const container = document.getElementById('tagsContainer');
            const input = document.getElementById('tagInput');
            const exists = Array.from(container.querySelectorAll('.tag-chip')).some(c => c.textContent.includes(tag));
            if (exists) { showToast('标签已存在', 'error'); return; }
            const chip = document.createElement('span');
            chip.className = 'tag-chip';
            chip.innerHTML = `${escapeHtml(tag)}<span class="remove-tag" onclick="removeTagChip(this)">×</span>`;
            container.insertBefore(chip, input);
        }

        function removeTagChip(el) { el.parentElement.remove(); }
        
        function getFormTags() {
            return Array.from(document.querySelectorAll('#tagsContainer .tag-chip'))
                .map(c => c.textContent.replace('×', '').trim());
        }

        document.getElementById('recordForm').addEventListener('submit', async e => {
            e.preventDefault();
            const name = document.getElementById('recordName').value.trim();
            if (!name) { showToast('请输入名称', 'error'); return; }

            const data = {
                name,
                purpose: document.getElementById('recordPurpose').value.trim(),
                url: document.getElementById('recordUrl').value.trim(),
                tags: getFormTags()
            };

            if (editingId === null) {
                data.id = records.length ? Math.max(...records.map(r => r.id)) + 1 : 1;
                records.push(data);
            } else {
                const idx = records.findIndex(r => r.id === editingId);
                if (idx !== -1) records[idx] = { ...records[idx], ...data };
            }

            await saveData();
            processTags();
            renderTable();
            renderTagFilters();
            closeModal('editModal');
        });

        async function deleteRecord(id) {
            if (!confirm('确定删除这条记录吗？')) return;
            records = records.filter(r => r.id !== id);
            await saveData();
            processTags();
            renderTable();
            renderTagFilters();
            showToast('删除成功', 'success');
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `传送卷轴_${new Date().toLocaleDateString()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('导出成功 📤', 'success');
        }

        function showToast(msg, type = '') {
            toast.textContent = msg;
            toast.className = 'toast';
            if (type) toast.classList.add(type);
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function shortenUrl(url) {
            try {
                const u = new URL(url);
                return u.hostname + u.pathname.substring(0, 15) + (u.pathname.length > 15 ? '...' : '');
            } catch { return url; }
        }

        document.querySelectorAll('.modal-overlay').forEach(o => {
            o.addEventListener('click', e => { if (e.target === o) o.classList.remove('active'); });
        });
    </script>
</body>
</html>
